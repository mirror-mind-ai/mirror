name: Docs

on:
  push:
    branches: [main, "claude/**", mirror-ts-core]
    paths:
      - "docs/**"
      - "**.md"
      - "scripts/check_doc_links.py"
      - "src/memory/docs_lint.py"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "**.md"
      - "scripts/check_doc_links.py"
      - "src/memory/docs_lint.py"

permissions:
  contents: read

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check documentation links and anchors
        run: uv run python scripts/check_doc_links.py
