name: Tests

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check src/ tests/

      - name: Run tests
        run: uv run pytest tests/unit/ tests/integration/ -m "not live" --cov=src --cov-report=term-missing
        env:
          MEMORY_ENV: test
          ECONOMY_ENV: test
          # API keys intentionally absent — all live tests are excluded via -m "not live"

      - name: Golden parity determinism (regenerate must be a no-op)
        run: |
          uv run python ts/parity/generate_golden.py
          uv run python ts/parity/generate_persona_golden.py
          uv run python ts/parity/generate_journeys_golden.py
          git diff --exit-code ts/test/goldens/
        env:
          MEMORY_ENV: test
          ECONOMY_ENV: test

  ts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Lint (Biome)
        run: npm run lint

      - name: Run tests (node:test)
        run: npm test
